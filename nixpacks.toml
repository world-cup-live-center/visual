# Railway / Nixpacks build yapilandirmasi
# ffmpeg + ffprobe sistemi kurar. ProRes 4444 / alpha transcode bunlara baglidir;
# bu olmadan sunucu WebM fallback'e duser. (apt 'ffmpeg' paketi ffprobe'u da icerir.)
# fonts-dejavu-core: kota dolunca export'a basilan filigran (drawtext) icin font.
[phases.setup]
aptPkgs = ["ffmpeg", "fonts-dejavu-core"]
