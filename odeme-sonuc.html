<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>MoS Rhythm | Ödeme Sonucu</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { colors: {
          accent: "#e8172a", accent2: "#b5101d", mint: "#ff4d60",
          muted: "#7a7a7a", cream: "#ffffff", ink: "#050505"
        }, fontFamily: { display: ["Constantia","Georgia","serif"], body: ["Bahnschrift",'"Trebuchet MS"',"Aptos","sans-serif"] } } }
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
    <style type="text/tailwindcss">
      .btn { @apply inline-flex items-center justify-center rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-cream transition duration-200 hover:border-accent/40 hover:bg-accent/10 no-underline; }
      .btn-primary { @apply border-transparent bg-gradient-to-br from-accent to-accent2 font-bold text-white hover:from-[#ff1a2e] hover:to-accent; }
    </style>
  </head>
  <body class="flex min-h-screen items-center justify-center bg-ink font-body text-cream antialiased">
    <div class="page-noise"></div>
    <main class="relative z-10 w-[min(28rem,calc(100%-2rem))] rounded-3xl border border-white/10 bg-gradient-to-b from-[#0c0405] to-[#070000] p-8 text-center shadow-[0_0_60px_rgba(232,23,42,0.2)]">
      <!-- BASARILI -->
      <div id="view-success" class="hidden">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full" style="background:rgba(80,220,140,.12)">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#7ee6a8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
        </div>
        <h1 class="mt-4 font-display text-2xl font-bold">Ödeme başarılı 🎉</h1>
        <p class="mt-2 text-sm leading-relaxed text-muted">
          Aboneliğin aktifleşti ve paketin hesabına tanımlandı. Yeni kotanla temiz export almaya başlayabilirsin.
        </p>
        <div class="mt-6 flex flex-col gap-2">
          <a href="index.html" class="btn btn-primary w-full">Uygulamaya dön</a>
          <a href="paketler.html" class="btn w-full">Plan durumumu gör</a>
        </div>
      </div>

      <!-- BASARISIZ -->
      <div id="view-fail" class="hidden">
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full" style="background:rgba(232,23,42,.12)">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#ff6b76" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>
        <h1 class="mt-4 font-display text-2xl font-bold">Ödeme tamamlanamadı</h1>
        <p class="mt-2 text-sm leading-relaxed text-muted">Ödemen alınamadı; kartından ücret çekildiyse iade edilir.</p>
        <p id="fail-reason" class="mx-auto mt-3 hidden max-w-xs rounded-lg border border-accent/30 bg-accent/10 px-3 py-2 text-xs text-accent"></p>
        <div class="mt-6 flex flex-col gap-2">
          <a href="paketler.html" class="btn btn-primary w-full">Tekrar dene</a>
          <a href="index.html" class="btn w-full">Uygulamaya dön</a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const success = params.get("status") === "success";
        document.getElementById(success ? "view-success" : "view-fail").classList.remove("hidden");
        const reason = params.get("reason");
        if (!success && reason) {
          const el = document.getElementById("fail-reason");
          el.textContent = reason;
          el.classList.remove("hidden");
        }
      })();
    </script>
  </body>
</html>
